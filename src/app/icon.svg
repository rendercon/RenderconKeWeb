<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Purple rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="#7C35CC"/>

  <!-- Orbit 1 — horizontal -->
  <ellipse cx="50" cy="50" rx="34" ry="13"
    fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"
    transform="rotate(0 50 50)"/>

  <!-- Orbit 2 — rotated 60° -->
  <ellipse cx="50" cy="50" rx="34" ry="13"
    fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"
    transform="rotate(60 50 50)"/>

  <!-- Orbit 3 — rotated 120° -->
  <ellipse cx="50" cy="50" rx="34" ry="13"
    fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"
    transform="rotate(120 50 50)"/>

  <!-- Nucleus -->
  <circle cx="50" cy="50" r="5.5" fill="white"/>
</svg>
